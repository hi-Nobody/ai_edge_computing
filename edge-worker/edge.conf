# FinFlow 邊緣節點設定檔
# 這個檔案放在 Kaggle / Colab / Lightning AI 的工作目錄下
# 或是在 Notebook 開頭用 os.environ 覆蓋

# ── 必填：Oracle 核心端連線資訊 ──
ORACLE_URL=https://your-oracle-public-ip-or-domain

# ── 必填：本節點身分（需在 Oracle 的 NODE_API_KEYS_JSON 中預先登記）──
NODE_ID=kaggle-1
NODE_API_KEY=change-me-to-your-own-node-secret

# ── 模型設定（這裡是最常需要修改的地方）──
# 常用選項（擇一填入，取消前面的 # 號）：
MODEL_NAME=qwen3-coder:30b
# MODEL_NAME=qwen2.5-coder:14b
# MODEL_NAME=qwen2.5-coder:32b
# MODEL_NAME=qwen3:8b
# MODEL_NAME=deepseek-coder-v2:16b
# MODEL_NAME=codellama:13b

# ── 單次推論逾時（秒）──
# 實測 qwen3-coder:30b 在雙 T4 環境下，冷啟動（模型剛載入、CUDA kernel 尚未編譯）
# 第一次請求 load+prompt_eval 加起來約 126 秒；穩定後生成速度約 65 tokens/秒。
# 300 秒對冷啟動有安全邊際，對長輸出的真實任務也有餘裕，遠低於 Oracle 端
# JOB_WAIT_TIMEOUT_SEC 的 900 秒。換其他模型如果明顯更快/更慢，可以調整這個值。
INFERENCE_TIMEOUT_SEC=300

# ── TLS 驗證（使用自簽憑證方案A時保持 false）──
VERIFY_TLS=false

# ── 閒置自動停止（節省 Kaggle/Colab/Lightning GPU 配額）──
# 連續這麼多秒沒有任何任務可做，節點就會自動結束 process（連同關閉 Ollama）。
# 設為 0 或負數 = 停用，節點永遠不會自動停止。
# 預設 1800（30 分鐘）；依你的使用頻率調整，太短容易在還在用的時候被關掉。
IDLE_STOP_SEC=1800
