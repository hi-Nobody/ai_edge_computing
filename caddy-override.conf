# Caddy 是 dnf/copr 套件安裝的，/usr/lib/systemd/system/caddy.service 本體
# 不歸這個 repo 管（套件更新時會被覆蓋），所以不直接修改它，改用 systemd
# 的 drop-in override 機制外掛一條 EnvironmentFile=，讓 caddy 進程啟動時
# 也能讀到 finflow-queue.env（跟 finflow-queue.service／bot-gateway.service
# 共用同一份，全系統只有一份機敏設定檔，見 DEPLOY.md「為何不合併 caddy.service」）。
#
# 部署方式（setup-https.sh 步驟 4 會自動做這件事，這裡列出來給手動排查用）：
#   sudo mkdir -p /etc/systemd/system/caddy.service.d
#   sudo cp caddy-override.conf /etc/systemd/system/caddy.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart caddy
#
# 手動執行 `caddy validate` 這種不透過 systemd 啟動的指令，不會自動套用這份
# override，需要自己把環境變數帶進去：
#   cd /home/opc/finflow-queue
#   export $(grep ORACLE_PUBLIC_IP finflow-queue.env)
#   sudo -E caddy validate --config Caddyfile

[Service]
EnvironmentFile=/home/opc/finflow-queue/finflow-queue.env
