# FinFlow 邊緣節點設定檔
# 這個檔案放在 Kaggle / Colab / Lightning AI 的工作目錄下
# 或是在 Notebook 開頭用 os.environ 覆蓋
#
# 這份檔案跟 Oracle 端的 finflow-queue.env 是「兩台不同機器上各自獨立的檔案」，
# 不能像 Caddyfile 的 {$ORACLE_PUBLIC_IP} 那樣用變數引用──Kaggle/Colab/Lightning
# 是完全另一台機器（甚至每次重開都可能是不同的實體機），沒有管道讀到 Oracle 本機
# 的 finflow-queue.env，兩份檔案的值只能靠你手動維持一致，沒有辦法自動同步。
# 下面兩個必填值改了以後，記得同時去 Oracle 那邊的對應設定也改掉，否則節點會連不上
# 或被拒絕（分別對應下面的說明）。

# ── 必填：Oracle 核心端連線資訊 ──
# 必須對應 Oracle 端 finflow-queue.env 的 ORACLE_PUBLIC_IP（方案 A 自簽憑證）
# 或 DOMAIN_NAME（Step 4-A Cloudflare 代管憑證），這裡要填完整的 https:// URL，
# 不是只填 IP／網域本身（Oracle 端那兩個變數只存值本身，組 URL 的邏輯在
# Caddyfile／setup-https.sh 裡，edge.conf 這邊沒有對應的組字邏輯，要手動拼好）
ORACLE_URL=https://myproj2.dpdns.org

# ── 必填：本節點身分 ──
# NODE_API_KEY 必須跟 Oracle 端 finflow-queue.env 的 NODE_API_KEYS_JSON 裡，
# 這個 NODE_ID 對應的值完全一致（例如 NODE_ID=kaggle-1，就要跟
# NODE_API_KEYS_JSON 裡 "kaggle-1" 那組的值相同），改一邊沒改另一邊，
# 節點會在 /jobs/next 被 Oracle 拒絕（401 Invalid Node API Key）
NODE_ID=kaggle-1
NODE_API_KEY=4872a137159bec634e6eea86a7a3808e

# ── 模型設定（這裡是最常需要修改的地方）──
# 常用選項（擇一填入，取消前面的 # 號）：
MODEL_NAME=qwen3-coder:30b
# MODEL_NAME=pdurlej/qwythos-9b-claude-mythos-5-1m:Q4_K_M
# MODEL_NAME=gemma4:12b
# MODEL_NAME=qwen2.5-coder:14b
# MODEL_NAME=qwen2.5-coder:32b
# MODEL_NAME=qwen3:8b
# MODEL_NAME=deepseek-coder-v2:16b
# MODEL_NAME=codellama:13b

# ── 單次推論逾時（秒）──
# 實測 qwen3-coder:30b 在雙 T4 環境下，冷啟動（模型剛載入、CUDA kernel 尚未編譯）
# 第一次請求 load+prompt_eval 加起來約 126 秒；穩定後生成速度約 65 tokens/秒。
# 300 秒對冷啟動有安全邊際，對長輸出的真實任務也有餘裕，遠低於 Oracle 端
# JOB_WAIT_TIMEOUT_SEC 的 900 秒。換其他模型如果明顯更快/更慢，可以調整這個值。
INFERENCE_TIMEOUT_SEC=300

# ── TLS 驗證（使用自簽憑證方案A時保持 false）──
VERIFY_TLS=false

# ── 閒置自動停止（節省 Kaggle/Colab/Lightning GPU 配額）──
# 連續這麼多秒沒有任何任務可做，節點就會自動結束 process（連同關閉 Ollama）。
# 設為 0 或負數 = 停用，節點永遠不會自動停止。
# 預設 1800（30 分鐘）；依你的使用頻率調整，太短容易在還在用的時候被關掉。
IDLE_STOP_SEC=1800
